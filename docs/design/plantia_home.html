<div class="pw">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css');
@import url('https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css');

.pw{padding:0}
.pw *{font-family:Pretendard,-apple-system,BlinkMacSystemFont,sans-serif;box-sizing:border-box;margin:0;padding:0}

/* ── Main Screen ─────────────────────────────── */
.ms{
  width:390px;
  margin:0 auto;
  background:#F4F7F2;
  min-height:844px;
  display:flex;
  flex-direction:column;
}

/* ── Header ──────────────────────────────────── */
.ms-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 20px 10px;
}
.ms-logo{display:flex;align-items:center;gap:8px;font-size:22px;font-weight:800;color:#1B3A1C;letter-spacing:-.02em}
.ms-bell{
  width:40px;height:40px;border-radius:50%;
  border:1.5px solid #D0E4CC;background:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;
}
.ms-bell-dot{
  position:absolute;top:7px;right:7px;
  width:8px;height:8px;background:#2E7D32;border-radius:50%;border:2px solid #fff;
}

/* ── Greeting ────────────────────────────────── */
.ms-greet{padding:10px 20px 16px}
.ms-greet-sub{font-size:14px;color:#7A8C7B;font-weight:500;margin-bottom:5px}
.ms-greet-main{font-size:26px;font-weight:800;color:#1F2A21;line-height:1.25;letter-spacing:-.02em}

/* ── Diagnosis Card (v6 embedded) ───────────── */
.diag-card{
  margin:0 16px 31px;
  background:#fff;
  border-radius:28px;
  padding:33px 18px 22px;
  box-shadow:0 4px 20px rgba(46,125,50,.13);
}
/* v6-derived styles */
.chk{width:21px;height:21px;border-radius:50%;background:#2E7D32;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 1px 3px rgba(46,125,50,.25)}
.chk i{font-size:12px;color:#fff;line-height:1}
.col{font-size:12.5px;color:#1F2A21;line-height:1.4;font-weight:500;letter-spacing:-.01em}
.dl{border-top:1.6px dashed #A8DDB5}

/* ── Section Header ──────────────────────────── */
.sec-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;margin-bottom:12px;
}
.sec-left{display:flex;align-items:center;gap:7px;font-size:16px;font-weight:700;color:#1F2A21}
.sec-right{font-size:13px;color:#8A9A8B;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:1px}

/* ── Recent Records ──────────────────────────── */
.rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px}
.rec-card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 12px rgba(42,84,40,.08)}
.rec-photo{width:100%;height:148px;position:relative;display:flex;align-items:flex-end;justify-content:center;overflow:hidden}
.rec-badge{
  position:absolute;top:10px;right:10px;
  background:rgba(28,90,32,.88);color:#fff;
  font-size:11px;font-weight:700;
  padding:4px 9px 4px 6px;border-radius:20px;
  display:flex;align-items:center;gap:4px;
}
.rec-badge i{font-size:12px}
.rec-info{padding:11px 13px 14px}
.rec-name-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.rec-name{font-size:15px;font-weight:700;color:#1F2A21;letter-spacing:-.01em}
.rec-date{font-size:11px;color:#A0AFA1;margin-bottom:4px;font-weight:500}
.rec-desc{font-size:12px;color:#6B7B73;line-height:1.45;font-weight:500}

/* ── Tab Bar ─────────────────────────────────── */
.tab-bar{
  margin-top:auto;
  background:#fff;
  border-top:1px solid #E6EEE3;
  display:flex;
  padding:10px 0 20px;
}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.tab-item i{font-size:24px;color:#B8CCB9}
.tab-item span{font-size:10.5px;color:#B8CCB9;font-weight:500}
.tab-item.active i{color:#2A5428}
.tab-item.active span{color:#2A5428;font-weight:700}
</style>

<div class="ms">

  <!-- ── Header ── -->
  <div class="ms-hdr">
    <div class="ms-logo">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
        <path d="M13 3 C8 3 4 7 4 12 C4 17 8 22 13 23 C18 22 22 17 22 12 C22 7 18 3 13 3Z" fill="#2A5428" opacity=".15"/>
        <path d="M13 24 L13 10" stroke="#2A5428" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M13 16 Q8 12 8 7 Q13 7 13 13" fill="#2A5428"/>
        <path d="M13 13 Q18 9 18 4 Q13 4 13 10" fill="#3D7A3A"/>
      </svg>
      Plantia
    </div>
    <button class="ms-bell">
      <i class="ti ti-bell" style="font-size:18px;color:#4A6B48"></i>
      <span class="ms-bell-dot"></span>
    </button>
  </div>

  <!-- ── Greeting ── -->
  <div class="ms-greet">
    <p class="ms-greet-sub">안녕하세요! 🌱</p>
    <h1 class="ms-greet-main">오늘 식물 상태는<br>어떤가요?</h1>
  </div>

  <!-- ── Diagnosis Card (v6 content) ── -->
  <div class="diag-card">
    <h1 style="text-align:center;font-size:24px;font-weight:800;color:#1F2A21;margin:0 0 10px;letter-spacing:-.02em">식물 진단 시작하기</h1>
    <p style="text-align:center;font-size:13.5px;color:#6B7B73;line-height:1.65;font-weight:500">정확한 진단을 위해<br><span style="color:#2E7D32;font-weight:700">잎이 잘 보이게</span> 촬영해주세요.</p>

    <div style="position:relative;width:100%;height:211px;margin:8px auto 4px">
      <div style="position:absolute;left:50%;top:24px;transform:translateX(-50%);width:120px;height:120px;border-radius:50%;background:#E7F4E9"></div>

      <svg viewBox="0 0 324 288" style="position:absolute;left:50%;top:0;transform:translateX(-50%);width:259px;height:211px" aria-hidden="true">
        <g transform="translate(162 215)">
          <g transform="rotate(-78) scale(0.85)"><path d="M0 0 C-12 -25 -16 -70 0 -110 C16 -70 12 -25 0 0 Z" fill="#2E6A35"/></g>
          <g transform="rotate(78) scale(0.82)"><path d="M0 0 C-12 -25 -16 -70 0 -110 C16 -70 12 -25 0 0 Z" fill="#2E6A35"/></g>
        </g>
        <g transform="translate(162 215)">
          <g transform="rotate(-55) scale(0.95)"><path d="M0 0 C-12 -25 -16 -70 0 -110 C16 -70 12 -25 0 0 Z" fill="#3D8744"/><path d="M0 -4 C-1 -55 1 -100 0 -107" stroke="#9FD3A2" stroke-width="0.8" fill="none" opacity="0.6"/></g>
          <g transform="rotate(-30) scale(1.04)"><path d="M0 0 C-12 -25 -16 -70 0 -115 C16 -70 12 -25 0 0 Z" fill="#4A9550"/><path d="M0 -4 C-1 -55 1 -105 0 -112" stroke="#9FD3A2" stroke-width="0.8" fill="none" opacity="0.65"/></g>
          <g transform="rotate(-5) scale(1.12)"><path d="M0 0 C-13 -28 -17 -75 0 -120 C17 -75 13 -28 0 0 Z" fill="#52A056"/><path d="M0 -4 C-1 -60 1 -110 0 -117" stroke="#A8DDA8" stroke-width="0.9" fill="none" opacity="0.7"/></g>
          <g transform="rotate(22) scale(1.06)"><path d="M0 0 C-12 -25 -16 -70 0 -115 C16 -70 12 -25 0 0 Z" fill="#4A9550"/><path d="M0 -4 C-1 -55 1 -105 0 -112" stroke="#9FD3A2" stroke-width="0.8" fill="none" opacity="0.65"/></g>
          <g transform="rotate(48) scale(0.97)"><path d="M0 0 C-12 -25 -16 -70 0 -110 C16 -70 12 -25 0 0 Z" fill="#3D8744"/><path d="M0 -4 C-1 -55 1 -100 0 -107" stroke="#9FD3A2" stroke-width="0.8" fill="none" opacity="0.6"/></g>
        </g>
        <ellipse cx="162" cy="215" rx="50" ry="6" fill="#3D2E1F"/>
        <rect x="108" y="210" width="108" height="12" rx="2.5" fill="#EBE2CC"/>
        <path d="M111 222 L213 222 L206 268 L118 268 Z" fill="#DDD3BD"/>
        <path d="M111 222 L113 229 L211 229 L213 222 Z" fill="#C9BFA5" opacity="0.4"/>
        <ellipse cx="164" cy="115" rx="2.5" ry="3.5" fill="#fff" opacity="0.9"/>
        <ellipse cx="139" cy="142" rx="2" ry="3" fill="#fff" opacity="0.8"/>
        <ellipse cx="184" cy="145" rx="2.2" ry="3.2" fill="#fff" opacity="0.85"/>
      </svg>

      <!-- 초점 -->
      <div class="dl" style="position:absolute;top:40px;right:88px;width:24px"></div>
      <div style="position:absolute;top:30px;right:0;display:flex;align-items:flex-start;gap:5px">
        <div class="chk"><i class="ti ti-check"></i></div>
        <div class="col">초점이 맞게<br>선명하게</div>
      </div>
      <!-- 잎 -->
      <div class="dl" style="position:absolute;top:96px;left:84px;width:24px"></div>
      <div style="position:absolute;top:86px;left:0;display:flex;align-items:flex-start;gap:5px">
        <div class="chk"><i class="ti ti-check"></i></div>
        <div class="col">잎 전체가<br>보이게</div>
      </div>
      <!-- 화분 -->
      <div class="dl" style="position:absolute;top:168px;right:96px;width:24px"></div>
      <div style="position:absolute;top:158px;right:0;display:flex;align-items:flex-start;gap:5px">
        <div class="chk"><i class="ti ti-check"></i></div>
        <div class="col">화분과 배경이<br>잘 보이게</div>
      </div>
    </div>

    <!-- Camera + Album button -->
    <div style="position:relative;margin-top:44px">
      <div style="background:#ECF4EC;border-radius:26px;padding:60px 16px 18px">
        <p style="text-align:center;font-size:17px;font-weight:700;color:#1F2A21;line-height:1.2;margin-bottom:18px;letter-spacing:-.01em">사진 촬영</p>
        <button style="width:100%;height:52px;border-radius:16px;border:0;background:#fff;color:#1F2A21;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;box-shadow:0 4px 14px rgba(183,225,195,.40)">
          <i class="ti ti-photo" style="font-size:20px;color:#1B5E20"></i>앨범에서 선택
        </button>
      </div>
      <div style="position:absolute;top:-50px;left:50%;transform:translateX(-50%);width:100px;height:100px;border-radius:50%;background:#1B5E20;display:flex;align-items:center;justify-content:center;border:6px solid #fff;box-shadow:0 8px 22px rgba(27,94,32,.35);z-index:2">
        <i class="ti ti-camera" style="font-size:44px;color:#fff"></i>
      </div>
    </div>
  </div>

  <!-- ── Recent Records ── -->
  <div class="sec-row">
    <div class="sec-left">
      <i class="ti ti-clock" style="font-size:18px;color:#3A6E37"></i>
      최근 진단 기록
    </div>
    <div class="sec-right">전체 보기<i class="ti ti-chevron-right" style="font-size:14px;margin-left:2px"></i></div>
  </div>

  <div class="rec-grid">
    <!-- 산세베리아 -->
    <div class="rec-card">
      <div class="rec-photo" style="background:linear-gradient(160deg,#F5F4EE 0%,#EAE8DF 100%)">
        <svg viewBox="0 0 140 148" width="140" height="148" style="position:absolute;bottom:0">
          <!-- pot -->
          <rect x="46" y="116" width="48" height="6" rx="2" fill="#D8D0BC"/>
          <path d="M49 122 L44 148 L96 148 L91 122Z" fill="#CCC4B0"/>
          <!-- sansevieria leaves -->
          <g transform="translate(70 116)">
            <path d="M0 0 C-3 -20 -5 -55 -2 -80 C2 -55 1 -20 0 0Z" fill="#3A7040" transform="rotate(-15)"/>
            <path d="M0 0 C-3 -20 -5 -60 -1 -88 C3 -60 2 -20 0 0Z" fill="#4A8A50" transform="rotate(5)"/>
            <path d="M0 0 C-3 -20 -5 -52 -1 -76 C3 -52 2 -20 0 0Z" fill="#3A7040" transform="rotate(22)"/>
            <path d="M0 0 C-2 -15 -4 -42 -1 -62 C2 -42 1 -15 0 0Z" fill="#528558" transform="rotate(-28)"/>
            <path d="M0 0 C-2 -15 -4 -44 -1 -64 C2 -44 1 -15 0 0Z" fill="#528558" transform="rotate(35)"/>
            <!-- stripe patterns -->
            <path d="M-1 -50 Q0 -48 1 -50" stroke="#7DB87F" stroke-width="0.5" fill="none" opacity="0.6" transform="rotate(5)"/>
          </g>
        </svg>
        <div class="rec-badge"><i class="ti ti-circle-check-filled"></i>건강함</div>
      </div>
      <div class="rec-info">
        <div class="rec-name-row">
          <span class="rec-name">산세베리아</span>
          <i class="ti ti-chevron-right" style="font-size:14px;color:#B0C4B2"></i>
        </div>
        <div class="rec-date">2024. 05. 18</div>
        <div class="rec-desc">전반적으로 건강해 해요!</div>
      </div>
    </div>

    <!-- 몬스테라 -->
    <div class="rec-card">
      <div class="rec-photo" style="background:linear-gradient(160deg,#EEF3EC 0%,#E2ECDE 100%)">
        <svg viewBox="0 0 140 148" width="140" height="148" style="position:absolute;bottom:0">
          <!-- pot -->
          <rect x="46" y="116" width="48" height="6" rx="2" fill="#D4CFC6"/>
          <path d="M49 122 L44 148 L96 148 L91 122Z" fill="#C8C3B8"/>
          <!-- monstera leaves -->
          <g transform="translate(68 114)">
            <!-- left large leaf -->
            <ellipse cx="-18" cy="-52" rx="22" ry="32" fill="#3E7A44" transform="rotate(-20,-18,-52)"/>
            <!-- holes in left leaf -->
            <ellipse cx="-22" cy="-44" rx="4" ry="6" fill="#E2ECDE" transform="rotate(-20,-22,-44)"/>
            <ellipse cx="-10" cy="-62" rx="3" ry="5" fill="#E2ECDE" transform="rotate(-20,-10,-62)"/>
            <!-- right large leaf -->
            <ellipse cx="20" cy="-48" rx="22" ry="30" fill="#4A8A50" transform="rotate(15,20,-48)"/>
            <!-- holes in right leaf -->
            <ellipse cx="24" cy="-40" rx="4" ry="5" fill="#EEF3EC" transform="rotate(15,24,-40)"/>
            <ellipse cx="13" cy="-58" rx="3" ry="4" fill="#EEF3EC" transform="rotate(15,13,-58)"/>
            <!-- stem -->
            <line x1="0" y1="0" x2="-14" y2="-48" stroke="#2A5A30" stroke-width="2" stroke-linecap="round"/>
            <line x1="0" y1="0" x2="16" y2="-44" stroke="#2A5A30" stroke-width="2" stroke-linecap="round"/>
          </g>
        </svg>
        <div class="rec-badge"><i class="ti ti-circle-check-filled"></i>건강함</div>
      </div>
      <div class="rec-info">
        <div class="rec-name-row">
          <span class="rec-name">몬스테라</span>
          <i class="ti ti-chevron-right" style="font-size:14px;color:#B0C4B2"></i>
        </div>
        <div class="rec-date">2024. 05. 16</div>
        <div class="rec-desc">잎이 튼튼해요!</div>
      </div>
    </div>
  </div>

  <!-- ── Tab Bar ── -->
  <div class="tab-bar" style="margin-top:28px">
    <div class="tab-item active">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="display:block">
        <path d="M12 3 L21 11 L19 11 L19 20.5 L5 20.5 L5 11 L3 11 Z" fill="#D4EBC8" stroke="#587A4E" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
        <rect x="9" y="14" width="6" height="6.5" rx="1.2" fill="#587A4E"/>
      </svg>
      <span>홈</span>
    </div>
    <div class="tab-item">
      <i class="ti ti-scan"></i>
      <span>진단</span>
    </div>
    <div class="tab-item">
      <i class="ti ti-plant-2"></i>
      <span>내 식물</span>
    </div>
    <div class="tab-item">
      <i class="ti ti-settings"></i>
      <span>설정</span>
    </div>
  </div>

</div>
</div>
