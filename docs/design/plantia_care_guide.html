<div class="cg-wrap">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css');
@import url('https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css');

.cg-wrap{padding:16px 0}
.cg-wrap *{font-family:Pretendard,-apple-system,BlinkMacSystemFont,sans-serif;box-sizing:border-box;margin:0;padding:0}

.cg{
  width:390px;
  margin:0 auto;
  background:#F4F7F2;
  min-height:844px;
  padding:28px 20px 48px;
}

/* ── Page Header ─────────────────────────────── */
.pg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.pg-title{font-size:22px;font-weight:800;color:#2A5428;letter-spacing:-.02em}
.pg-add{font-size:20px;color:#A8C8A4;background:none;border:none;cursor:pointer;line-height:1;padding:4px}

/* ── Card Base ───────────────────────────────── */
.card{background:#fff;border-radius:22px;padding:20px;margin-bottom:14px;box-shadow:0 2px 12px rgba(42,84,40,.07)}

/* ── Card Section Header ─────────────────────── */
.sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.sec-icon{width:44px;height:44px;border-radius:50%;background:#E6F4E0;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-icon i{font-size:22px;color:#2A5428}
.sec-title{font-size:17px;font-weight:700;color:#1B2B1C;letter-spacing:-.01em}
.sec-sub{font-size:12.5px;color:#7A8C7B;margin-top:3px;font-weight:500}

/* ── Care List (세로 1열 스택 — 환경 정보 행과 통일) ── */
.care-list{display:flex;flex-direction:column}
.care-row{display:flex;align-items:center;gap:14px;padding:13px 2px;border-bottom:1.2px dashed #DDE8DA}
.care-row:last-child{border-bottom:none}
.care-ic{
  width:44px;height:44px;border-radius:50%;
  background:#F2F8F2;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.care-ic i{font-size:22px;color:#2A5428}
.care-lbl{font-size:14.5px;color:#4A5C4C;font-weight:500;flex:1;white-space:nowrap}
.care-val{font-size:14px;color:#283A2A;font-weight:600;line-height:1.5;text-align:right}
.diff-badge{background:#E6F4E0;color:#2A5428;font-size:12px;font-weight:700;padding:5px 16px;border-radius:30px;white-space:nowrap;flex-shrink:0}

/* ── Season Sub-Section (지속 관리법 카드 내부) ── */
.season-wrap{
  background:#F2F8F2;
  border-radius:18px;
  padding:16px;
  margin-top:16px;
}
.season-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.season-icon{width:38px;height:38px;border-radius:50%;background:#D6ECCC;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.season-hdr-title{font-size:16px;font-weight:700;color:#1B2B1C;letter-spacing:-.01em}

.season-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.season-card{
  background:#fff;
  border-radius:14px;
  padding:14px 12px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 1px 4px rgba(42,84,40,.06);
}
.drop-svg{width:42px;height:50px;flex-shrink:0}
.s-name{font-size:14px;font-weight:700;color:#1B2B1C;letter-spacing:-.01em}
.s-freq{font-size:12.5px;color:#7A8C7B;margin-top:2px;font-weight:500}

/* ── Info List ───────────────────────────────── */
.info-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1.2px dashed #DDE8DA}
.info-row:last-child{border-bottom:none}
.info-ic{
  width:42px;height:42px;border-radius:50%;
  background:#F2F8F2;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.info-lbl{font-size:14.5px;color:#1B2B1C;font-weight:500;flex:1;white-space:nowrap}
.info-val{font-size:14.5px;color:#2A5428;font-weight:600;min-width:0;text-align:right}
</style>

<div class="cg">

  <!-- Page Header -->
  <div class="pg-header">
    <h1 class="pg-title">케어 가이드</h1>
    <button class="pg-add">✦</button>
  </div>

  <!-- ── Card 1: 지속 관리법 + 계절별 물주기 (통합) ── -->
  <div class="card">
    <div class="sec-hdr">
      <div class="sec-icon"><i class="ti ti-leaf"></i></div>
      <div>
        <div class="sec-title">지속 관리법</div>
        <div class="sec-sub">건강한 성장을 위해 꾸준히 관리해 주세요.</div>
      </div>
    </div>

    <div class="care-list">
      <!-- 토양 -->
      <div class="care-row">
        <div class="care-ic">
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
            <path d="M4 19 Q13 10 22 19" stroke="#2A5428" stroke-width="1.7" stroke-linecap="round" fill="none"/>
            <line x1="4" y1="21" x2="22" y2="21" stroke="#2A5428" stroke-width="1.7" stroke-linecap="round"/>
            <path d="M13 18 L13 10 M10 14 Q13 10 16 14" stroke="#2A5428" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
        <div class="care-lbl">토양</div>
        <div class="care-val">배수 좋은 흙</div>
      </div>
      <!-- 광량 -->
      <div class="care-row">
        <div class="care-ic"><i class="ti ti-sun" style="font-size:22px;color:#2A5428"></i></div>
        <div class="care-lbl">광량</div>
        <div class="care-val">밝은 간접광</div>
      </div>
      <!-- 배치 -->
      <div class="care-row">
        <div class="care-ic">
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
            <path d="M8 14 L7 22 L19 22 L18 14 Z" stroke="#2A5428" stroke-width="1.6" stroke-linejoin="round" fill="none"/>
            <line x1="6" y1="14" x2="20" y2="14" stroke="#2A5428" stroke-width="1.6" stroke-linecap="round"/>
            <line x1="13" y1="14" x2="13" y2="7" stroke="#2A5428" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M13 10 Q9 7 9 4 Q12 4 13 8" stroke="#2A5428" stroke-width="1.3" stroke-linecap="round" fill="none"/>
            <path d="M13 9 Q17 6 17 3 Q14 3 13 7" stroke="#2A5428" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
        <div class="care-lbl">배치</div>
        <div class="care-val">통풍이 잘 되는 실내</div>
      </div>
      <!-- 관리 난이도 -->
      <div class="care-row">
        <div class="care-ic"><i class="ti ti-gauge" style="font-size:22px;color:#2A5428"></i></div>
        <div class="care-lbl">관리 난이도</div>
        <span class="diff-badge">쉬움</span>
      </div>
    </div>

    <!-- ── 계절별 물주기 (내부 서브섹션) ── -->
    <div class="season-wrap">
      <div class="season-hdr">
        <div class="season-icon">
          <svg width="20" height="20" viewBox="0 0 22 22" fill="none">
            <path d="M11 2 C16 8 19 13 19 16.5 C19 20 15.4 22 11 22 C6.6 22 3 20 3 16.5 C3 13 6 8 11 2Z" stroke="#2A5428" stroke-width="1.7" fill="none"/>
            <path d="M8 17 Q11 13 14 17" stroke="#2A5428" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
        <div class="season-hdr-title">계절별 물주기</div>
      </div>

      <div class="season-grid">
        <!-- 봄 -->
        <div class="season-card">
          <svg class="drop-svg" viewBox="0 0 52 64" fill="none">
            <path d="M26 3 C38 17 49 33 49 46 C49 57 38.5 63 26 63 C13.5 63 3 57 3 46 C3 33 14 17 26 3 Z" fill="#EBF6E5" stroke="#2A5428" stroke-width="1.8"/>
            <line x1="26" y1="54" x2="26" y2="36" stroke="#2A5428" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M26 44 Q20 40 18 33 Q23 32 26 38" fill="none" stroke="#2A5428" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M26 44 Q32 40 34 33 Q29 32 26 38" fill="none" stroke="#2A5428" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <div><div class="s-name">봄</div><div class="s-freq">1주 1회</div></div>
        </div>

        <!-- 여름 -->
        <div class="season-card">
          <svg class="drop-svg" viewBox="0 0 52 64" fill="none">
            <path d="M26 3 C38 17 49 33 49 46 C49 57 38.5 63 26 63 C13.5 63 3 57 3 46 C3 33 14 17 26 3 Z" fill="#EBF6E5" stroke="#2A5428" stroke-width="1.8"/>
            <circle cx="26" cy="42" r="8" stroke="#2A5428" stroke-width="1.6" fill="none"/>
            <line x1="26" y1="26" x2="26" y2="30" stroke="#2A5428" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="26" y1="54" x2="26" y2="58" stroke="#2A5428" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="10" y1="42" x2="14" y2="42" stroke="#2A5428" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="38" y1="42" x2="42" y2="42" stroke="#2A5428" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="14.9" y1="31" x2="17.8" y2="33.8" stroke="#2A5428" stroke-width="1.3" stroke-linecap="round"/>
            <line x1="37.1" y1="31" x2="34.2" y2="33.8" stroke="#2A5428" stroke-width="1.3" stroke-linecap="round"/>
            <line x1="17.8" y1="50.2" x2="14.9" y2="53" stroke="#2A5428" stroke-width="1.3" stroke-linecap="round"/>
            <line x1="34.2" y1="50.2" x2="37.1" y2="53" stroke="#2A5428" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <div><div class="s-name">여름</div><div class="s-freq">3~4일 1회</div></div>
        </div>

        <!-- 가을 -->
        <div class="season-card">
          <svg class="drop-svg" viewBox="0 0 52 64" fill="none">
            <path d="M26 3 C38 17 49 33 49 46 C49 57 38.5 63 26 63 C13.5 63 3 57 3 46 C3 33 14 17 26 3 Z" fill="#EBF6E5" stroke="#2A5428" stroke-width="1.8"/>
            <path d="M20 30 C17 27 15 22 18 19 C22 19 24 24 20 30Z" stroke="#2A5428" stroke-width="1.3" fill="none" stroke-linejoin="round"/>
            <line x1="20" y1="30" x2="16" y2="36" stroke="#2A5428" stroke-width="1.1" stroke-linecap="round"/>
            <path d="M34 40 C31 37 29 32 32 29 C36 29 38 34 34 40Z" stroke="#2A5428" stroke-width="1.3" fill="none" stroke-linejoin="round"/>
            <line x1="34" y1="40" x2="30" y2="46" stroke="#2A5428" stroke-width="1.1" stroke-linecap="round"/>
            <path d="M22 50 C19 47 17 42 20 39 C24 39 26 44 22 50Z" stroke="#2A5428" stroke-width="1.3" fill="none" stroke-linejoin="round"/>
            <line x1="22" y1="50" x2="18" y2="56" stroke="#2A5428" stroke-width="1.1" stroke-linecap="round"/>
          </svg>
          <div><div class="s-name">가을</div><div class="s-freq">1주 1회</div></div>
        </div>

        <!-- 겨울 -->
        <div class="season-card">
          <svg class="drop-svg" viewBox="0 0 52 64" fill="none">
            <path d="M26 3 C38 17 49 33 49 46 C49 57 38.5 63 26 63 C13.5 63 3 57 3 46 C3 33 14 17 26 3 Z" fill="#EBF6E5" stroke="#2A5428" stroke-width="1.8"/>
            <line x1="26" y1="24" x2="26" y2="58" stroke="#2A5428" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="11.6" y1="32" x2="40.4" y2="50" stroke="#2A5428" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="40.4" y1="32" x2="11.6" y2="50" stroke="#2A5428" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="26" y1="32" x2="22" y2="28" stroke="#2A5428" stroke-width="1.1" stroke-linecap="round"/>
            <line x1="26" y1="32" x2="30" y2="28" stroke="#2A5428" stroke-width="1.1" stroke-linecap="round"/>
            <line x1="26" y1="50" x2="22" y2="54" stroke="#2A5428" stroke-width="1.1" stroke-linecap="round"/>
            <line x1="26" y1="50" x2="30" y2="54" stroke="#2A5428" stroke-width="1.1" stroke-linecap="round"/>
            <circle cx="26" cy="41" r="2.5" fill="#2A5428"/>
          </svg>
          <div><div class="s-name">겨울</div><div class="s-freq">1달 1회</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Card 2: 환경 정보 리스트 ── -->
  <div class="card" style="padding:4px 20px">
    <div class="info-row">
      <div class="info-ic">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="9" y="2" width="6" height="14" rx="3" stroke="#3A6E37" stroke-width="1.7" fill="none"/>
          <circle cx="12" cy="17" r="4" stroke="#3A6E37" stroke-width="1.7" fill="none"/>
          <circle cx="12" cy="17" r="2" fill="#3A6E37"/>
          <line x1="11" y1="7" x2="13" y2="7" stroke="#3A6E37" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="11" y1="10" x2="13" y2="10" stroke="#3A6E37" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="info-lbl">생육 적온</div>
      <div class="info-val">16~30°C</div>
    </div>
    <div class="info-row">
      <div class="info-ic">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2 C17 8 20 13 20 16.5 C20 20 16.4 22 12 22 C7.6 22 4 20 4 16.5 C4 13 7 8 12 2Z" stroke="#3A6E37" stroke-width="1.7" fill="none"/>
          <path d="M9 16 Q12 12.5 15 16" stroke="#3A6E37" stroke-width="1.3" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div class="info-lbl">습도</div>
      <div class="info-val">40~50%</div>
    </div>
    <div class="info-row">
      <div class="info-ic">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="5" y="8" width="14" height="13" rx="3" stroke="#3A6E37" stroke-width="1.7" fill="none"/>
          <path d="M8 8 L8 5 Q8 3 10 3 L14 3 Q16 3 16 5 L16 8" stroke="#3A6E37" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="9" y1="13" x2="15" y2="13" stroke="#3A6E37" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="9" y1="16" x2="13" y2="16" stroke="#3A6E37" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="info-lbl">비료</div>
      <div class="info-val">봄·여름 한 달 1회</div>
    </div>
  </div>

</div>
</div>
